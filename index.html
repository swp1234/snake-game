<body>
    <div class="app-loader" id="app-loader">
        <div class="loader-content">
            <div class="loader-emoji">🐍</div>
            <div class="loader-spinner"></div>
            <div class="loader-text" data-i18n="app.loading">로딩 중...</div>
        </div>
    </div>
    <a href="#main-content" class="skip-link" data-i18n="app.skipLink">Skip to content</a>

    <!-- Background Grid -->
    <div class="bg-grid" id="bg-grid"></div>

    <!-- Sound Toggle -->
    <button class="sound-toggle" id="sound-toggle" onclick="if(window.sfx)window.sfx.init();const enabled=window.sfx?window.sfx.toggle():false;this.textContent=enabled?'🔊':'🔇';" title="Toggle Sound">🔊</button>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>

    <!-- Language Selector -->
    <div class="language-selector">
        <button class="lang-btn" id="langBtn" title="Change Language">🌐</button>
        <div class="lang-menu hidden" id="langMenu"></div>
    </div>

    <div class="game-wrapper" id="main-content">
        <!-- === MENU SCREEN === -->
        <div class="screen menu-screen active" id="menu-screen">
            <div class="ad-banner ad-top">
                <span class="ad-placeholder" data-i18n="ad.placeholder">광고 영역</span>
            </div>

            <div class="menu-content">
                <div class="game-logo">
                    <span class="logo-snake">🐍</span>
                    <h1>SNAKE CLASSIC</h1>
                    <p class="logo-sub" data-i18n="menu.subtitle">클래식 뱀 게임</p>
                </div>

                <div class="high-score-display" id="menu-highscore">
                    <span class="hs-label" data-i18n="menu.highScore">최고 점수</span>
                    <span class="hs-value" id="hs-value">0</span>
                </div>

                <div class="menu-buttons">
                    <button class="btn-primary btn-start" id="btn-start">
                        <span data-i18n="menu.startGame">게임 시작</span>
                        <span class="btn-icon">▶</span>
                    </button>
                    <button class="btn-secondary btn-modes" id="btn-modes">
                        <span data-i18n="menu.modes">🎮 게임 모드</span>
                    </button>
                    <button class="btn-secondary btn-stats" id="btn-stats">
                        <span data-i18n="menu.stats">📊 통계</span>
                    </button>
                </div>

                <p class="menu-hint" data-i18n="menu.hint">방향키/WASD 또는 스와이프로 조작</p>

                <a href="https://dopabrain.com/portal/" class="home-link" data-i18n="menu.home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="m15 18-6-6 6-6"></path></svg>
                    DopaBrain 홈
                </a>
            </div>
        </div>

        <!-- === MODE SELECTION === -->
        <div class="screen mode-screen hidden" id="mode-screen">
            <div class="mode-header">
                <button class="btn-back" id="btn-mode-back" data-i18n="screens.back">← 뒤로</button>
                <h2 data-i18n="screens.modes">게임 모드</h2>
            </div>
            <div class="mode-grid">
                <button class="mode-card" id="mode-wall" data-mode="wall">
                    <span class="mode-icon">🧱</span>
                    <span class="mode-name" data-i18n="modes.wall">벽 모드</span>
                    <span class="mode-desc" data-i18n="modes.wallDesc">벽에 부딪히면 게임오버</span>
                </button>
                <button class="mode-card" id="mode-infinite" data-mode="infinite">
                    <span class="mode-icon">∞</span>
                    <span class="mode-name" data-i18n="modes.infinite">무한 모드</span>
                    <span class="mode-desc" data-i18n="modes.infiniteDesc">벽을 통과할 수 있음</span>
                </button>
            </div>
        </div>

        <!-- === GAME SCREEN === -->
        <div class="screen game-screen hidden" id="game-screen">
            <div class="game-hud">
                <div class="hud-left">
                    <div class="hud-score" id="hud-score">0</div>
                    <div class="hud-mode" id="hud-mode">WALL</div>
                </div>
                <button class="hud-pause" id="btn-pause" aria-label="pause" data-i18n-attr="pause.title">⏸</button>
            </div>
            <canvas id="game-canvas"></canvas>
            <div class="tap-hint" id="tap-hint" data-i18n="game.tapToStart">탭하여 시작!</div>

            <!-- Direction Control Buttons for Mobile/Mouse -->
            <div class="direction-controls" id="direction-controls">
                <button class="dir-btn dir-up" id="dir-up" aria-label="up">▲</button>
                <div class="dir-horizontal">
                    <button class="dir-btn dir-left" id="dir-left" aria-label="left">◀</button>
                    <button class="dir-btn dir-down" id="dir-down" aria-label="down">▼</button>
                    <button class="dir-btn dir-right" id="dir-right" aria-label="right">▶</button>
                </div>
            </div>
        </div>

        <!-- === PAUSE OVERLAY === -->
        <div class="overlay pause-overlay hidden" id="pause-overlay">
            <div class="overlay-card">
                <h2 data-i18n="pause.title">일시정지</h2>
                <div class="pause-buttons">
                    <button class="btn-primary" id="btn-resume" data-i18n="pause.resume">계속하기</button>
                    <button class="btn-secondary" id="btn-quit" data-i18n="pause.quit">메뉴로</button>
                </div>
            </div>
        </div>

        <!-- === GAMEOVER SCREEN === -->
        <div class="screen gameover-screen hidden" id="gameover-screen">
            <div class="gameover-card">
                <h2 class="go-title" data-i18n="gameover.title">게임 오버 💥</h2>

                <div class="go-scores">
                    <div class="go-score-main">
                        <span class="go-label" data-i18n="gameover.score">점수</span>
                        <span class="go-value" id="go-score">0</span>
                    </div>
                    <div class="go-score-best">
                        <span class="go-label" data-i18n="gameover.best">최고</span>
                        <span class="go-value" id="go-best">0</span>
                    </div>
                </div>

                <div class="go-rank" id="go-rank">
                    <span class="rank-icon">🌱</span>
                    <span class="rank-title">초급 뱀 조련사</span>
                </div>

                <div class="go-new-record hidden" id="go-new-record" data-i18n="gameover.newRecord">🎉 새 기록!</div>

                <div class="go-buttons">
                    <button class="btn-revive" id="btn-revive">
                        <span class="revive-icon">📺</span>
                        <span data-i18n="gameover.revive">광고 보고 부활하기</span>
                    </button>
                    <button class="btn-primary btn-retry" id="btn-retry">
                        <span data-i18n="gameover.retry">다시 하기</span>
                    </button>
                    <div class="go-sub-buttons">
                        <button class="btn-share" id="btn-share" data-i18n="gameover.share">📤 공유</button>
                        <button class="btn-menu" id="btn-menu" data-i18n="gameover.menu">🏠 메뉴</button>
                    </div>
                </div>
            </div>

            <div class="ad-banner ad-bottom-go">
                <span class="ad-placeholder" data-i18n="ad.placeholder">광고 영역</span>
            </div>
        </div>

        <!-- === STATS SCREEN === -->
        <div class="screen stats-screen hidden" id="stats-screen">
            <div class="stats-header">
                <button class="btn-back" id="btn-stats-back" data-i18n="screens.back">← 뒤로</button>
                <h2 data-i18n="screens.stats">통계</h2>
            </div>
            <div class="stats-content" id="stats-content"></div>
        </div>

        <!-- === INTERSTITIAL AD OVERLAY === -->
        <div class="overlay interstitial-overlay hidden" id="interstitial-overlay">
            <div class="interstitial-card">
                <p class="interstitial-label" data-i18n="ad.label">광고</p>
                <div class="interstitial-placeholder" data-i18n="ad.placeholder_interstitial">광고 영역 (전면)</div>
                <div class="interstitial-timer">
                    <span id="ad-countdown">5</span><span data-i18n="ad.countdown">초 후 닫기</span>
                </div>
                <button class="btn-close-ad hidden" id="btn-close-ad" data-i18n="ad.close">✕ 닫기</button>
            </div>
        </div>
    </div>

    <!-- Related Apps -->
    <section class="related-apps" style="margin:24px 16px;padding:20px;background:rgba(255,255,255,0.05);border-radius:16px;border:1px solid rgba(255,255,255,0.1);">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:14px;color:#aaa;">🎮 관련 게임</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a href="/flappy-bird/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;text-decoration:none;color:inherit;font-size:13px;font-weight:600;">🐦 Flappy Bird</a>
        <a href="/brick-breaker/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;text-decoration:none;color:inherit;font-size:13px;font-weight:600;">🧱 Brick Breaker</a>
        <a href="/minesweeper/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;text-decoration:none;color:inherit;font-size:13px;font-weight:600;">💣 Minesweeper</a>
      </div>
    </section>

    <!-- Footer with Home Link -->
    <footer class="game-footer">
        <a href="https://dopabrain.com/portal/" class="back-link" data-i18n="game.back" aria-label="Go back to DopaBrain home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
            DopaBrain 홈
        </a>
    </footer>

    <script src="js/storage-manager.js" defer></script>
    <script src="js/leaderboard-manager.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/sound-engine.js" defer></script>
    <script src="/_common/js/haptic.js" defer></script>
    <script src="/_common/js/daily-streak.js" defer></script>
    <script src="js/app.js" defer></script>

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    console.log('Service Worker registered:', registration);
                }).catch((error) => {
                    console.warn('Service Worker registration failed:', error);
                });
            });
        }
    </script>

    <style>
        .sound-toggle {
            position: fixed;
            top: 12px;
            right: 100px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .sound-toggle:hover { background: rgba(255,255,255,0.2); }
        .sound-toggle:active { transform: scale(0.95); }
    </style>
    <script src="/portal/js/cross-promo.js" defer></script>
</body>
